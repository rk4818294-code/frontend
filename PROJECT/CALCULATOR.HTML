<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Calculator</title>
  <link rel="stylesheet" href="calculator.css" />
</head>
<style>
  :root{
  --bg:#f3f4f6;
  --panel:#1f2937;
  --accent:#10b981;
  --btn:#e5e7eb;
  --btn-op:#f59e0b;
  --text:#111827;
  --white:#ffffff;
}

*{box-sizing:border-box}
html,body{
  height:100%;
  margin:0;
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;
  background: linear-gradient(180deg,var(--bg),#ffffff);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.calculator{
  width:340px;
  max-width:100%;
  background:var(--white);
  border-radius:12px;
  box-shadow:0 10px 30px rgba(2,6,23,0.15);
  overflow:hidden;
  border:2px solid rgba(0,0,0,0.05);
}

.display{
  background: linear-gradient(180deg, #111827 0%, #0f172a 100%);
  color:var(--white);
  padding:22px;
  font-size:32px;
  text-align:right;
  min-height:66px;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  letter-spacing:0.6px;
}

.buttons{
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:12px;
  padding:16px;
  background:linear-gradient(180deg, rgba(255,255,255,0.8), rgba(255,255,255,0.9));
}

.btn{
  padding:18px 12px;
  font-size:18px;
  border-radius:10px;
  border: none;
  background:var(--btn);
  color:var(--text);
  cursor:pointer;
  box-shadow: 0 2px 0 rgba(0,0,0,0.06);
  transition:transform .05s ease, box-shadow .05s ease;
}

.btn:active{ transform: translateY(1px); box-shadow:none; }

.btn.op{ background:var(--btn-op); color:#111827; font-weight:600; }
.btn.action{ background:#f3f4f6; color:#374151; }
.btn.equals{ background:var(--accent); color:var(--white); grid-column:4 / 5; grid-row:5 / 6; height:100%; }
.btn.zero{ grid-column:1 / 3; }

@media (max-width:380px){
  .display{ font-size:26px; padding:16px; min-height:56px; }
  .btn{ padding:14px 8px; font-size:16px; }
}
</style>
<body>
  <div class="calculator" role="application" aria-label="Simple calculator">
    <div class="display" id="display" aria-live="polite">0</div>

    <div class="buttons">
      <button class="btn action" data-value="C" aria-label="clear">C</button>
      <button class="btn action" data-value="DEL" aria-label="delete">DEL</button>
      <button class="btn action" data-value="%" aria-label="percent">%</button>
      <button class="btn op" data-value="÷" aria-label="divide">÷</button>

      <button class="btn" data-value="7">7</button>
      <button class="btn" data-value="8">8</button>
      <button class="btn" data-value="9">9</button>
      <button class="btn op" data-value="×" aria-label="multiply">×</button>

      <button class="btn" data-value="4">4</button>
      <button class="btn" data-value="5">5</button>
      <button class="btn" data-value="6">6</button>
      <button class="btn op" data-value="-" aria-label="subtract">-</button>

      <button class="btn" data-value="1">1</button>
      <button class="btn" data-value="2">2</button>
      <button class="btn" data-value="3">3</button>
      <button class="btn op" data-value="+" aria-label="add">+</button>

      <button class="btn zero" data-value="0">0</button>
      <button class="btn" data-value=".">.</button>
      <button class="btn equals" data-value="=" aria-label="equals">=</button>
    </div>
  </div>

  <script > 
    // Simple Calculator logic
(function(){
  const display = document.getElementById('display');
  const buttons = Array.from(document.querySelectorAll('.btn'));
  let expression = '';

  function updateDisplay(text){
    display.textContent = text === '' ? '0' : text;
  }

  function append(value){
    // prevent multiple leading zeros
    if (expression === '' && value === '0') {
      expression = '0';
      updateDisplay(expression);
      return;
    }
    // avoid two decimals in the same number
    if (value === '.') {
      const parts = expression.split(/[\+\-\×\÷\*\/]/);
      const last = parts[parts.length - 1];
      if (last.includes('.')) return;
      if (last === '') value = '0.';
    }
    expression += value;
    updateDisplay(expression);
  }

  function clearAll(){
    expression = '';
    updateDisplay('0');
  }

  function backspace(){
    expression = expression.slice(0, -1);
    updateDisplay(expression === '' ? '0' : expression);
  }

  function evaluateExpression(){
    if (expression.trim() === '') return;
    // Replace common symbols
    let expr = expression.replace(/×/g, '*').replace(/÷/g, '/');

    // convert percentage like 50% into (50/100)
    expr = expr.replace(/(\d+(\.\d+)?)%/g, '($1/100)');

    // sanitize: allow only digits, operators, parentheses, decimal and spaces
    if (/[^0-9+\-*/().\s%]/.test(expr)) {
      updateDisplay('Error');
      expression = '';
      return;
    }

    try {
      // Use Function to evaluate expression (safer than eval but still be careful)
      const result = Function('"use strict"; return (' + expr + ')')();
      expression = String(result);
      updateDisplay(expression);
    } catch (e) {
      updateDisplay('Error');
      expression = '';
    }
  }

  // Button click handling
  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      const v = btn.dataset.value;
      if (!v) return;
      if (v === 'C') {
        clearAll();
      } else if (v === 'DEL') {
        backspace();
      } else if (v === '=') {
        evaluateExpression();
      } else if (v === '%') {
        // if there's a number at end, convert it to percent immediately
        if (/\d$/.test(expression)) {
          expression += '%';
          evaluateExpression();
        } else {
          // otherwise append for user to use like 50% * 2
          append('%');
        }
      } else {
        append(v);
      }
    });
  });

  // Keyboard support
  window.addEventListener('keydown', (e) => {
    const key = e.key;
    if ((/^[0-9]$/).test(key)) {
      append(key);
      e.preventDefault();
    } else if (key === '.') {
      append('.');
      e.preventDefault();
    } else if (key === '+' || key === '-' || key === '*' || key === '/') {
      // map '*' and '/' directly, show × ÷ on display when clicked by button; we accept plain symbols in typing
      append(key);
      e.preventDefault();
    } else if (key === 'Enter' || key === '=') {
      evaluateExpression();
      e.preventDefault();
    } else if (key === 'Backspace') {
      backspace();
      e.preventDefault();
    } else if (key === 'Escape') {
      clearAll();
      e.preventDefault();
    } else if (key === '%') {
      if (/\d$/.test(expression)) {
        expression += '%';
        evaluateExpression();
      } else {
        append('%');
      }
      e.preventDefault();
    }
  });

  // initialize
  updateDisplay('0');
})();
  </script>
</body>
</html>
