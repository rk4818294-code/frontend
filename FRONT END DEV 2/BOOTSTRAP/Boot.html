<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet"href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
  </head>
  <body class="bg-black">
 
   <!-- Margin and Padding in Bootstrap

 my-0  -> 0 rem                  mx-0
 my-1  -> 0.25 rem               mx-1
 my-2  -> 0.5 rem                mx-2
 my-3  -> 1 rem                  mx-3
 my-4  -> 1.5rem                 mx-4
 my-5  -> 3 rem                  mx-5

padding: 1rem(top-bottom) 2rem(left-right); 

COLORS ->

Primary   = Blue
Secondary = Grey
Success   = Green
Danger    = Red
Warning   = Yellow
Info      = Sky blue
Light     = White
Dark      = Black        -->

    <h1 class="text-primary my-3">h1. Bootstrap heading</h1>
    <h2 class="text-secondary mx-2">h2. Bootstrap heading</h2>
    <h3 class="text-success p-3">h3. Bootstrap heading</h3>
    <h4 class="text-info m-2">h4. Bootstrap heading</h4>
    <h5 class="text-danger mx-3">h5. Bootstrap heading</h5>
    <h6 class=" text-success bg-warning m-5">h6. Bootstrap heading</h6>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
