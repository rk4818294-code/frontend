<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Responsive Cards</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="row">

<!-- Card 1 -->
<div class="col-lg-6 col-md-6 col-12 mb-4">
<div class="card shadow">
<img src="https://images.unsplash.com/photo-1722285806095-353cb9e099d3?w=1000&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8N3x8Y2FyZCUyMGltYWdlfGVufDB8fDB8fHww" class="card-img-top " alt="card image">
<div class="card-body">
<h5 class="card-title">Card 1</h5>
<p class="card-text">
This is a responsive Bootstrap card. It appears side by side on large screens.
</p>
<a href="#" class="btn btn-primary">Read More</a>
</div>
</div>
</div>

<!-- Card 2 -->
<div class="col-lg-6 col-md-6 col-12 mb-4">
<div class="card shadow">
<img src="https://images.unsplash.com/photo-1722285806095-353cb9e099d3?w=1000&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8N3x8Y2FyZCUyMGltYWdlfGVufDB8fDB8fHww" class="card-img-top" alt="card image">
<div class="card-body">
<h5 class="card-title">Card 2</h5>
<p class="card-text">
On small screens, the cards stack vertically using Bootstrap grid system.
</p>
<a href="#" class="btn btn-primary">Read More</a>
</div>
</div>
</div>

</div>
</div>

</body>
</html>
