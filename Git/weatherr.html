<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Weather APP</h1>
    <input
      type="text"
      id="city"
      placeholder="Enter your city name"
      style="padding: 10px; width: 200px; border: none; border-radius: 5px"
    />

    <button
      onclick="getWeather()"
      style="
        padding: 10px 20px;
        border: none;
        background: #00a8ff;
        color: white;
        border-radius: 5px;
        cursor: pointer;
      "
    >
      Get Weather
    </button>

    <div id="result" style="margin-top: 30px; font-family: 20px"></div>

    <script>
      async function getWeather(){
      let city=document.getElementById("city").value;
      let apiKey = "a205731459494991827132541242507"

     let url = `https://api.weatherapi.com/v1/current.json?key=${apiKey}&q=${city}`
     let response=await  fetch(url);
     let data =await response.json();
     let weather = `
     <h2>${ data.location.name}</h2>
     <p>Temperature: ${data.current.temp_c}c </p>
 <p> Weather :${data.current.condition.text}</p>
`
  document.getElementById("result").innerHTML=weather
  }
     
    </script>
  </body>
</html>
