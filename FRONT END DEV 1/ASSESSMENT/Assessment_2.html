<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <link rel="stylesheet" href="Assessment_2.css">
</head>
<body>
  <div class="login-container">
    <h2>Welcome back</h2>

    <div class="login-buttons">
      <button class="google-btn">Log in with Google</button>
      <button class="apple-btn">Log in with Apple</button>
    </div>

    <p class="or">or</p>

    <form>
      <label>Email</label>
      <input type="email" placeholder="Enter your email" required>

      <label>Password</label>
      <input type="password" placeholder="Enter your password" required>

      <div class="remember">
        <input type="checkbox"> Remember me
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit" class="signin-btn">Sign in to your account</button>
    </form>

    <p class="signup-text">Don't have an account yet? <a href="#">Sign up here</a></p>
  </div>
</body>
</html>
